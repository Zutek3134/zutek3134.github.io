    <style>
        .header-padding {
            padding: calc(var(--gap) * 3);
        }

        .header .box {
            max-width: fit-content;
            margin: auto;
        }

        img.invite {
            border-radius: var(--gap-half) var(--gap-half) 0 0;
        }

        .card-invite {
            background-color: var(--card-bg);
            padding: var(--gap);
            border-radius: 0 0 var(--gap-half) var(--gap-half);
        }

        .invite-title {
            text-transform: uppercase;
            font-size: 0.8em;
            font-family: var(--title-font);
            font-weight: 700;
            margin-top: 0;
        }

        .invite-name {
            display: flex;
            align-items: center;
            font-size: 1.2em;
            font-family: var(--title-font);
            font-weight: 700;
            color: var(--title-color);
        }

        .invite-name::before {
            content: '';
            display: inline-block;
            height: 3em;
            aspect-ratio: 1 / 1;
            background-image: url('/discord/zsh/images/icon.png');
            background-size: contain;
            border-radius: var(--gap-half);
            margin-right: var(--gap-half);
        }

        .invite-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(7em, 1fr));
            gap: var(--gap-half);
        }

        .darker {
            h2 {
                border: none;
                text-align: center;
            }

            h3 {
                color: var(--title-color);
            }

            .explore {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: var(--gap-half);

                a {
                    display: block;
                    background-color: var(--bg);
                    border-radius: var(--gap-half);
                    padding: var(--gap);
                    outline-offset: 0;
                    outline: 2px solid transparent;
                    transition: var(--transition), outline-offset 0.2s ease-in-out, outline 0.2s ease-in-out;

                    &.primary {
                        --importance: var(--primary);
                    }

                    &.secondary {
                        --importance: var(--secondary);
                    }

                    svg {
                        width: 2em;
                        height: 2em;
                        color: var(--importance);
                    }

                    &:hover {
                        color: var(--color);
                        outline-offset: 2px;
                        outline-color: var(--importance);
                    }
                }
            }
        }

        @media only screen and (max-width: 838px) {
            .header-padding {
                padding: var(--gap);
            }

            .invite-buttons {
                display: flex;
                flex-direction: column;
                margin-top: calc(var(--gap) * 1.5);
                width: 100%;

                a {
                    flex: 1;
                }
            }
        }
    </style>
</head>
